<!DOCTYPE html>
<html lang="ja" class="kids-app">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>モンスターけいさんシューター</title>
<link rel="stylesheet" href="../../shared/css/tokens.css">
<style>
  #game { position:fixed; inset:0; }
  canvas { display:block; touch-action:none; }

  /* ---------- HUD (このゲーム固有) ---------- */
  #hud { position:fixed; inset:0; pointer-events:none; display:none; }
  #topbar { position:absolute; top:0; left:0; right:0; padding:max(10px, env(safe-area-inset-top)) 14px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  #problem { font-size:clamp(30px,6vw,52px); font-weight:800; letter-spacing:3px; text-align:center; min-width:220px; border-color:#ffd93d; box-shadow:0 0 18px rgba(255,217,61,.35); }
  #stats { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .stat { font-size:clamp(14px,2.4vw,20px); font-weight:700; }
  #hearts { font-size:clamp(20px,3.6vw,30px); letter-spacing:2px; }
  #combo-pop { position:absolute; top:26%; left:50%; transform:translate(-50%,-50%) scale(0); font-size:clamp(28px,6vw,54px); font-weight:900; color:#ffd93d; text-shadow:0 3px 0 #b7791f, 0 0 24px rgba(255,217,61,.8); transition:transform .18s ease-out; }
  #combo-pop.show { transform:translate(-50%,-50%) scale(1); }
  #msg { position:absolute; top:38%; left:50%; transform:translateX(-50%); font-size:clamp(22px,4.5vw,40px); font-weight:900; color:#7CFC9A; text-shadow:0 2px 0 #1b7a3d, 0 0 20px rgba(124,252,154,.7); opacity:0; transition:opacity .25s; text-align:center; white-space:nowrap; }
  #msg.bad { color:#ff7b7b; text-shadow:0 2px 0 #8f1f1f, 0 0 20px rgba(255,123,123,.7); }
  #msg.show { opacity:1; }
  #hintbtn { position:absolute; bottom:max(14px, env(safe-area-inset-bottom)); left:14px; pointer-events:auto; background:#ffd93d; color:#5b3b00; border:none; border-radius:999px; padding:14px 22px; font-size:clamp(15px,2.6vw,20px); font-weight:800; box-shadow:0 4px 0 #b7791f; font-family:inherit; }
  #hintbtn:active { transform:translateY(3px); box-shadow:0 1px 0 #b7791f; }
  #flash { position:fixed; inset:0; background:#ff3b3b; opacity:0; pointer-events:none; transition:opacity .35s; }

  /* ---------- item bar ---------- */
  #itemBar { position:absolute; bottom:max(14px, env(safe-area-inset-bottom)); right:14px; display:flex; gap:8px; pointer-events:auto; }
  .item-slot { width:56px; height:56px; border-radius:16px; background:rgba(8,20,45,.72); border:2px solid rgba(255,255,255,.25); font-size:26px; display:flex; align-items:center; justify-content:center; font-family:inherit; }
  .item-slot.filled { background:linear-gradient(#fff2c4,#ffd93d); border-color:#b7791f; box-shadow:0 4px 0 #b7791f; }
  .item-slot.filled:active { transform:translateY(3px); box-shadow:0 1px 0 #b7791f; }
  #item-pop { position:absolute; top:52%; left:50%; transform:translate(-50%,-50%) scale(0); font-size:clamp(20px,4.4vw,32px); font-weight:900; color:#fff; background:rgba(8,20,45,.82); border:2px solid #ffd93d; border-radius:20px; padding:10px 22px; text-align:center; transition:transform .18s ease-out; white-space:nowrap; }
  #item-pop.show { transform:translate(-50%,-50%) scale(1); }
  #levelup-pop { position:fixed; top:16%; left:50%; transform:translateX(-50%) translateY(-30px); opacity:0; font-size:clamp(22px,4.8vw,36px); font-weight:900; color:#fff; text-shadow:0 3px 0 #b7791f, 0 0 24px rgba(255,217,61,.8); background:rgba(8,20,45,.85); border:3px solid #ffd93d; border-radius:22px; padding:16px 30px; text-align:center; z-index:30; transition:opacity .3s, transform .3s; pointer-events:none; }
  #levelup-pop.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- overlay display toggles (このゲーム固有) ---------- */
  #hintoverlay { display:none; }
  #hintcard { background:#fffbe8; border-radius:24px; padding:26px 30px; max-width:520px; width:92%; box-shadow:0 10px 40px rgba(0,0,0,.5); display:flex; flex-direction:column; align-items:center; gap:10px; }
  #hintcard h2 { color:#b7791f; font-size:clamp(20px,4vw,28px); font-weight:900; }
  #hintProblem { color:#4a3200; font-size:clamp(22px,4.4vw,32px); font-weight:900; }
  .cherry-instruction { color:#7a5a1a; font-size:clamp(14px,2.8vw,18px); font-weight:700; }
  .cherry-diagram { display:flex; flex-direction:column; align-items:center; }
  .cherry-card-top { font-size:clamp(28px,5vw,40px); font-weight:900; color:#4a3200; background:#fff; border:3px solid #4a3200; border-radius:16px; padding:2px 20px; }
  .cherry-lines { position:relative; width:170px; height:34px; }
  .cherry-lines::before, .cherry-lines::after { content:""; position:absolute; top:0; left:50%; width:2px; height:34px; background:#4a3200; }
  .cherry-lines::before { transform: rotate(-32deg) translateX(-38px); transform-origin:top; }
  .cherry-lines::after { transform: rotate(32deg) translateX(38px); transform-origin:top; }
  .cherry-slots-row { display:flex; gap:34px; }
  .cherry-slot { width:62px; height:62px; border-radius:50%; background:#ff6b6b; border:3px solid #b71c1c; color:#fff; font-size:clamp(20px,4vw,28px); font-weight:900; font-family:inherit; display:flex; align-items:center; justify-content:center; }
  .cherry-slot.filled { background:#3ec46d; border-color:#1b7a3d; }
  #cherryFeedback { min-height:1.6em; font-size:clamp(16px,3.2vw,22px); font-weight:900; }
  #cherrySteps { color:#4a3200; font-size:clamp(17px,3.6vw,26px); font-weight:800; line-height:1.7; min-height:1em; }
  #cherryPad { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .cherry-num { width:46px; height:46px; border-radius:12px; border:2px solid #4a3200; background:#fff; color:#4a3200; font-size:clamp(15px,3vw,20px); font-weight:900; font-family:inherit; }
  .cherry-num:active { transform:translateY(2px); }
  .cherry-num:disabled { opacity:.35; }
  .small-btn { padding:8px 18px; font-size:14px; box-shadow:none; background:rgba(74,50,0,.12); color:#4a3200; }
  .small-btn:active { transform:translateY(2px); }
  #gameover { display:none; }
  #map { display:none; }
  #storyIntro { display:none; }
  #stageClear { display:none; }
  #start { display:none; }
  #createProfile { display:none; }
  #mistakeOverlay { display:none; }
  #statsScreen { display:none; }
  #finalstats { color:#fff; font-size:clamp(18px,3.6vw,28px); font-weight:800; line-height:2; }
  #run-gems { color:#ffd93d; font-size:clamp(15px,3vw,20px); font-weight:800; }
  #continuebtn { display:none; background:linear-gradient(#7cfc9a,#3ec46d); box-shadow:0 6px 0 #1b7a3d, 0 10px 24px rgba(0,0,0,.4); }
  #continuebtn:active { box-shadow:0 2px 0 #1b7a3d; }
  #rotate-tip { color:#8fb4e8; font-size:13px; margin-top:6px; }

  /* ---------- persistent profile strip (start screen) ---------- */
  #profileStrip { display:flex; flex-direction:column; align-items:center; gap:8px; background:rgba(8,20,45,.55); border:2px solid rgba(255,255,255,.2); border-radius:20px; padding:14px 24px; }
  #levelBadge { color:#ffd93d; font-weight:900; font-size:clamp(16px,3vw,22px); }
  #xpBarWrap { width:min(70vw,320px); height:12px; border-radius:999px; background:rgba(255,255,255,.2); overflow:hidden; }
  #xpBarFill { height:100%; width:0%; background:linear-gradient(90deg,#7cfc9a,#3aa0ff); transition:width .4s ease-out; }
  #gemsDisplay { color:#cfe0ff; font-weight:800; font-size:clamp(13px,2.4vw,17px); }
  #bestRow { color:#cfe0ff; font-size:12px; font-weight:700; opacity:.85; }
  #completeBadge { color:#0b1e3a; background:linear-gradient(#fff2c4,#ffd93d); border-radius:999px; padding:4px 14px; font-weight:900; font-size:13px; }
  #completeBadge:empty { display:none; }
  #zukanRow { display:flex; gap:10px; margin-top:2px; }
  .zukan-icon { width:40px; height:40px; border-radius:12px; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:20px; filter:grayscale(1) brightness(.6); }
  .zukan-icon.got { background:rgba(255,217,61,.18); border-color:#ffd93d; filter:none; }

  /* ---------- stage progress (in-run HUD) ---------- */
  #stageStat { display:flex; align-items:center; gap:6px; }
  #stageIcon { font-size:1.3em; }

  /* ---------- stage map ---------- */
  #map { overflow-y:auto; }
  #mapTitle { color:#fff; font-size:clamp(22px,4.4vw,32px); font-weight:900; margin-bottom:4px; }
  #mapList { display:flex; flex-direction:column; align-items:center; gap:0; padding:6px 0 10px; }
  .stage-node-wrap { display:flex; flex-direction:column; align-items:center; }
  .stage-connector { width:4px; height:26px; background:rgba(255,255,255,.3); }
  .stage-node { display:flex; align-items:center; gap:14px; width:min(88vw,420px); background:rgba(8,20,45,.72); border:2px solid rgba(255,255,255,.25); border-radius:20px; padding:12px 20px; font-family:inherit; text-align:left; }
  .stage-node .stage-node-icon { font-size:34px; width:44px; text-align:center; }
  .stage-node .stage-node-name { color:#fff; font-weight:900; font-size:clamp(15px,2.8vw,19px); }
  .stage-node .stage-node-sub { color:#cfe0ff; font-size:12px; font-weight:700; }
  .stage-node.cleared { border-color:#7cfc9a; box-shadow:0 0 16px rgba(124,252,154,.4); }
  .stage-node.locked { opacity:.45; }
  .stage-node.locked .stage-node-icon { filter:grayscale(1); }
  #mapBackBtn { margin-top:6px; }

  /* ---------- story / stage-clear cards ---------- */
  .story-icon { font-size:56px; }
  #storyIntro h2, #stageClear h2 { color:#ffd93d; font-size:clamp(20px,4vw,28px); font-weight:900; }
  #storyIntro p, #stageClear p { max-width:560px; }
  #stageClearGems { color:#ffd93d; font-weight:800; font-size:clamp(15px,3vw,20px); }

  /* ---------- player select / create profile ---------- */
  .start-subrow { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  #switchPlayerBtn, #statsBtn { background:rgba(255,255,255,.14); box-shadow:none; font-size:clamp(13px,2.2vw,16px); padding:12px 20px; }
  #switchPlayerBtn:active, #statsBtn:active { transform:translateY(2px); }
  #playerList { display:flex; flex-wrap:wrap; justify-content:center; gap:14px; max-width:720px; }
  .player-card { position:relative; display:flex; flex-direction:column; align-items:center; gap:6px; width:130px; background:rgba(8,20,45,.72); border:2px solid rgba(255,255,255,.25); border-radius:20px; padding:16px 10px; font-family:inherit; }
  .player-card:active { transform:translateY(2px); }
  .player-avatar { font-size:44px; }
  .player-name { color:#fff; font-weight:900; font-size:15px; }
  .player-sub { color:#cfe0ff; font-size:11px; font-weight:700; }
  .player-delete { position:absolute; top:6px; right:8px; width:24px; height:24px; border-radius:999px; border:none; background:rgba(255,123,123,.85); color:#fff; font-size:13px; font-weight:900; line-height:24px; padding:0; font-family:inherit; }
  .player-card.confirm-delete { border-color:#ff7b7b; }
  .player-card.confirm-delete .player-delete { background:#ff3b3b; }

  #avatarPicker { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; max-width:420px; }
  .avatar-opt { width:52px; height:52px; border-radius:14px; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.25); font-size:26px; font-family:inherit; }
  .avatar-opt.sel { background:rgba(255,217,61,.22); border-color:#ffd93d; box-shadow:0 0 12px rgba(255,217,61,.5); }
  .create-title { color:#ffd93d; font-size:clamp(20px,4vw,28px); font-weight:900; }
  #nameInput { width:min(80vw,280px); padding:12px 16px; border-radius:16px; border:2px solid rgba(255,255,255,.3); background:rgba(255,255,255,.95); color:#0b1e3a; font-size:18px; font-weight:700; font-family:inherit; text-align:center; }

  /* ---------- mistake explanation ---------- */
  #mistakeCard { background:#fff0ea; border-radius:24px; padding:26px 30px; max-width:520px; width:92%; box-shadow:0 10px 40px rgba(0,0,0,.5); display:flex; flex-direction:column; align-items:center; gap:10px; }
  #mistakeCard h2 { color:#d85a30; font-size:clamp(20px,4vw,28px); font-weight:900; }
  #mistakeProblem { color:#4a2200; font-size:clamp(20px,4.2vw,30px); font-weight:900; }
  #mistakeSteps { color:#4a2200; font-size:clamp(18px,4vw,26px); font-weight:800; line-height:1.8; }
  #mistakeDiagramHost .cherry-slot { cursor:default; }

  /* ---------- stats screen ---------- */
  #statsScreen { overflow-y:auto; }
  #statsSummary { color:#fff; font-size:clamp(15px,3vw,20px); font-weight:800; text-align:center; line-height:1.8; background:rgba(8,20,45,.55); border:2px solid rgba(255,255,255,.2); border-radius:20px; padding:14px 24px; }
  #statsHistory { display:flex; flex-direction:column; gap:8px; width:min(90vw,480px); }
  .history-row { display:flex; align-items:center; justify-content:space-between; gap:10px; background:rgba(8,20,45,.55); border:2px solid rgba(255,255,255,.15); border-radius:14px; padding:10px 16px; }
  .history-date { color:#cfe0ff; font-size:12px; font-weight:700; width:78px; }
  .history-stage { color:#fff; font-size:13px; font-weight:800; flex:1; text-align:left; }
  .history-acc { font-weight:900; font-size:15px; }
</style>
</head>
<body class="kids-app kids-reset">
<div id="game"></div>

<div id="hud">
  <div id="topbar">
    <div class="pill" id="hearts">&#10084;&#65039;&#10084;&#65039;&#10084;&#65039;</div>
    <div class="pill" id="problem">8 + 7 = ?</div>
    <div class="pill" id="stats">
      <div class="stat">スコア <span id="score">0</span></div>
      <div class="stat" id="stageStat"><span id="stageIcon">🌲</span><span id="stageProgress">0/6</span>&nbsp;&nbsp;&#128293;<span id="combo">0</span></div>
    </div>
  </div>
  <div id="combo-pop"></div>
  <div id="item-pop"></div>
  <div id="msg"></div>
  <button type="button" id="hintbtn">&#127826; さくらんぼヒント</button>
  <div id="itemBar"></div>
</div>
<div id="levelup-pop"></div>
<div id="flash"></div>

<div class="overlay" id="playerSelect">
  <h1><span class="em">だれが</span> あそぶ?</h1>
  <div id="playerList"></div>
  <button type="button" class="bigbtn" id="newPlayerBtn">&#10133; あたらしい プレイヤー</button>
</div>

<div class="overlay" id="createProfile">
  <h2 class="create-title">プレイヤーを つくろう</h2>
  <div id="avatarPicker"></div>
  <input id="nameInput" type="text" maxlength="8" placeholder="なまえ (8もじまで)">
  <button type="button" class="bigbtn" id="createConfirmBtn">つくる!</button>
  <button type="button" class="bigbtn" id="createBackBtn">もどる</button>
</div>

<div class="overlay" id="start">
  <h1>モンスター<br><span class="em">けいさん</span>シューター</h1>
  <p>すうじおうこくの すうじを、モンスターたちから とりもどす ぼうけんに でよう!<br>ただしい こたえの モンスターを タップして やっつけよう!</p>
  <div id="profileStrip">
    <div id="completeBadge"></div>
    <div id="levelBadge">Lv.1 けいさんみならい</div>
    <div id="xpBarWrap"><div id="xpBarFill"></div></div>
    <div id="gemsDisplay">💎 0</div>
    <div id="bestRow"></div>
    <div id="zukanRow"></div>
  </div>
  <button type="button" class="bigbtn" id="startbtn">ぼうけんに でる!</button>
  <div class="start-subrow">
    <button type="button" class="bigbtn" id="statsBtn">&#128202; せいせきを みる</button>
    <button type="button" class="bigbtn" id="switchPlayerBtn">&#128260; ちがう ひとが あそぶ</button>
  </div>
  <p id="rotate-tip">&#128241; iPadは よこむきが おすすめ</p>
</div>

<div class="overlay" id="map">
  <div id="mapTitle">&#128506;&#65039; ぼうけんマップ</div>
  <div id="mapList"></div>
  <button type="button" class="bigbtn" id="mapBackBtn">もどる</button>
</div>

<div class="overlay" id="storyIntro">
  <div class="story-icon" id="storyIcon">&#127795;</div>
  <h2 id="storyTitle">しずかなもり</h2>
  <p id="storyText"></p>
  <button type="button" class="bigbtn" id="storyStartBtn">たたかう!</button>
  <button type="button" class="bigbtn" id="storyBackBtn">マップへもどる</button>
</div>

<div class="overlay" id="stageClear">
  <h1><span class="em">ステージクリア</span>!</h1>
  <div class="story-icon" id="clearIcon">&#127881;</div>
  <p id="clearText"></p>
  <div id="stageClearGems"></div>
  <button type="button" class="bigbtn" id="nextStageBtn" aria-label="つぎのステージへ"></button>
  <button type="button" class="bigbtn" id="clearMapBtn">マップへ もどる</button>
</div>

<div class="overlay" id="hintoverlay">
  <div id="hintcard">
    <h2>&#127826; さくらんぼ けいさん</h2>
    <div id="hintProblem"></div>
    <p class="cherry-instruction" id="cherryInstruction"></p>
    <div id="hintDiagramHost"></div>
    <div id="cherryFeedback"></div>
    <div id="cherrySteps"></div>
    <div id="cherryPad"></div>
    <button type="button" class="bigbtn small-btn" id="cherryResetBtn">&#8635; やりなおす</button>
  </div>
  <button type="button" class="bigbtn" id="hintclose">わかった!</button>
</div>

<div class="overlay" id="mistakeOverlay">
  <div id="mistakeCard">
    <h2>&#128161; かいせつ</h2>
    <div id="mistakeProblem"></div>
    <div id="mistakeDiagramHost"></div>
    <div id="mistakeSteps"></div>
  </div>
  <button type="button" class="bigbtn" id="mistakeNextBtn">つぎの もんだいへ</button>
</div>

<div class="overlay" id="statsScreen">
  <h1><span class="em">せいせき</span></h1>
  <div id="statsSummary"></div>
  <div id="statsHistory"></div>
  <button type="button" class="bigbtn" id="statsBackBtn">もどる</button>
</div>

<div class="overlay" id="gameover">
  <h1>ステージ<span class="em">しっぱい</span></h1>
  <div id="finalstats"></div>
  <div id="run-gems"></div>
  <button type="button" class="bigbtn" id="continuebtn" aria-label="コンティニュー"></button>
  <button type="button" class="bigbtn" id="retrybtn">もういちど!</button>
  <button type="button" class="bigbtn" id="gameoverMapBtn">マップへ もどる</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js" integrity="sha384-3YljIMKl/XEbvorEW5PsmELaNNzJxReJMpvhbpYScnKrnRDI8kmxmksZx4HNCxu3" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js" integrity="sha384-UWFC8mrevmKCZhKbJ/8/dqLrRAvHArRwJCKjwruJuXyhsebGMFsIK5zrn+R9r+fT" crossorigin="anonymous"></script>
<script src="assets/models-data.js"></script>
<script src="../../shared/js/audio.js"></script>
<script src="../../shared/js/profiles.js"></script>
<script src="progression.js"></script>
<script>
(function(){
"use strict";

/* ================= AUDIO ================= */
const kidsAudio = KidsAudio();
function audioInit(){ kidsAudio.init(); }
function tone(freq, dur, type, vol, when){ kidsAudio.tone(freq, dur, type, vol, when); }
const sfx = {
  shoot(){ tone(880,0.08,"square",0.12); tone(1320,0.1,"square",0.08,0.03); },
  boom(){ tone(160,0.3,"sawtooth",0.2); tone(90,0.4,"triangle",0.2,0.05); },
  good(){ tone(523,0.09,"square",0.12); tone(659,0.09,"square",0.12,0.09); tone(784,0.14,"square",0.12,0.18); },
  levelup(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.12,"square",0.14,i*0.1)); },
  bad(){ tone(200,0.25,"sawtooth",0.16); tone(150,0.3,"sawtooth",0.14,0.08); },
  hurt(){ tone(120,0.4,"sawtooth",0.22); tone(80,0.5,"triangle",0.2,0.1); },
  item(){ [660,880,1180].forEach((f,i)=>tone(f,0.1,"triangle",0.14,i*0.08)); },
  golden(){ [784,988,1175,1568].forEach((f,i)=>tone(f,0.1,"sine",0.16,i*0.08)); },
};

/* ================= THREE SETUP ================= */
const container = document.getElementById("game");
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8f7);
scene.fog = new THREE.Fog(0x7ec8f7, 30, 70);

/* ================= NUMBER LABEL TEXTURE ================= */
function makeLabel(num){
  const c = document.createElement("canvas"); c.width = 256; c.height = 256;
  const x = c.getContext("2d");
  x.fillStyle = "#ffffff";
  const r = 48;
  x.beginPath();
  x.moveTo(20+r,20); x.arcTo(236,20,236,236,r); x.arcTo(236,236,20,236,r); x.arcTo(20,236,20,20,r); x.arcTo(20,20,236,20,r);
  x.fill();
  x.strokeStyle = "#2b2b2b"; x.lineWidth = 10; x.stroke();
  x.fillStyle = "#222";
  x.font = "900 150px 'Hiragino Maru Gothic ProN', sans-serif";
  x.textAlign = "center"; x.textBaseline = "middle";
  x.fillText(String(num), 128, 138);
  const tex = new THREE.CanvasTexture(c);
  return new THREE.Mesh(
    new THREE.PlaneGeometry(1.7, 1.7),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true })
  );
}

/* ================= MONSTER FACTORY ================= */
/* モデルは CC0 (Quaternius "LowPoly Animated Monsters"). assets/models/CREDITS.md 参照。
   file:// で開いても fetch制限に引っかからないよう、OBJ/MTLのテキストは
   assets/models-data.js に埋め込み済みで、.parse() 経由で読み込む。 */
const palette = [0xff6b9d, 0x9b6bff, 0x54d1a1, 0xffa54a, 0x5ab8ff, 0xff6b6b];
const TARGET_HEIGHT = 2.6;
const MODEL_META = {
  slime:    { mainMat: "Body" },
  dragon:   { mainMat: "Main" },
  bat:      { mainMat: "Main" },
  skeleton: { mainMat: "Skeleton" },
};
const MODEL_KEYS = Object.keys(MODEL_META);

function normalizeModel(obj){
  obj.updateMatrixWorld(true);
  const size = new THREE.Box3().setFromObject(obj).getSize(new THREE.Vector3());
  obj.scale.setScalar(TARGET_HEIGHT / Math.max(size.y, 0.001));
  obj.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(obj);
  const center = box.getCenter(new THREE.Vector3());
  obj.position.set(-center.x, -box.min.y, -center.z);
}

function buildModelTemplate(key){
  const src = MONSTER_MODEL_SOURCES[key];
  const materials = new THREE.MTLLoader().parse(src.mtl, "");
  materials.preload();
  const obj = new THREE.OBJLoader().setMaterials(materials).parse(src.obj);
  normalizeModel(obj);
  return obj;
}

const MODEL_TEMPLATES = {};
MODEL_KEYS.forEach(key=>{ MODEL_TEMPLATES[key] = buildModelTemplate(key); });

function makeMonster(num, forceGolden){
  const g = new THREE.Group();
  const key = MODEL_KEYS[Math.floor(Math.random()*MODEL_KEYS.length)];
  const model = MODEL_TEMPLATES[key].clone(true);
  const mainMat = MODEL_META[key].mainMat;
  const golden = !!forceGolden || Math.random() < Progression.GOLDEN_CHANCE;
  const tintColor = golden ? 0xffd93d : palette[Math.floor(Math.random()*palette.length)];
  model.traverse(o=>{
    if(!o.isMesh) return;
    const mats = (Array.isArray(o.material) ? o.material : [o.material]).map(m=>m.clone());
    o.material = Array.isArray(o.material) ? mats : mats[0];
    mats.forEach(m=>{ if(m.name === mainMat) m.color.set(tintColor); });
  });
  if(golden) model.scale.multiplyScalar(forceGolden ? 1.3 : 1.12);
  g.add(model);

  /* number board above head */
  const label = makeLabel(num);
  label.position.set(0, TARGET_HEIGHT + 0.55, 0);
  g.add(label);

  g.userData = { answer:num, alive:true, bobPhase:Math.random()*Math.PI*2, label:label, bodyColor:tintColor, species:key, golden:golden, boss:!!forceGolden };
  g.traverse(o=>{ o.userData.root = g; });
  return g;
}

function renderPlayerSelect(){
  deleteArmedId = null;
  const list = $("playerList");
  list.innerHTML = "";
  Progression.listProfiles().forEach(p=>{
    const data = Progression.loadProfileData(p.id);
    const info = Progression.levelInfo(data.gems);
    const card = document.createElement("div");
    card.className = "player-card";
    card.innerHTML =
      '<button class="player-delete">&times;</button>' +
      '<div class="player-avatar">' + p.avatar + '</div>' +
      '<div class="player-name">' + p.name + '</div>' +
      '<div class="player-sub">Lv.' + info.level + ' ・ 💎' + data.gems + '</div>';
    card.addEventListener("click", e=>{
      if(e.target.closest(".player-delete")) return;
      selectProfile(p.id);
    });
    card.querySelector(".player-delete").addEventListener("click", e=>{
      e.stopPropagation();
      if(deleteArmedId !== p.id){
        deleteArmedId = p.id;
        renderPlayerSelect();
        return;
      }
      Progression.deleteProfile(p.id);
      deleteArmedId = null;
      renderPlayerSelect();
    });
    if(deleteArmedId === p.id) card.classList.add("confirm-delete");
    list.appendChild(card);
  });
}

function useItem(slotIndex){
  if(!S.running || S.paused || S.advancing) return;
  const key = S.inventory[slotIndex];
  if(!key) return;
  S.inventory.splice(slotIndex,1);
  renderInventory();
  if(key === "blast"){
    sfx.levelup();
    const gain = 20 + S.combo*2;
    S.score += gain;
    awardGems(gain);
    S.combo++; S.bestCombo = Math.max(S.bestCombo, S.combo); S.solved++;
    showMsg("💥 ばくはつショット!");
    popCombo();
    updateHUD();
    S.advancing = true;
    S.monsters.forEach(m=>{ explode(m.position.clone(), m.userData.bodyColor); scene.remove(m); });
    S.monsters = [];
    setTimeout(()=>{ if(S.running) spawnWave(); }, 500);
  } else if(key === "shield"){
    S.hasShield = true;
    showMsg("🛡️ まもりのたてを セット!");
  } else if(key === "slow"){
    if(S.slowTimer){ clearTimeout(S.slowTimer); } else { S.preSlowSpeed = S.speed; S.speed *= 0.5; }
    showMsg("🐌 スローモード!");
    S.slowTimer = setTimeout(()=>{ S.speed = S.preSlowSpeed; S.slowTimer = null; }, 10000);
  }
}

function genProblem(){
  const st = S.stage;
  S.op = st.opMode==="add" ? "+" : st.opMode==="sub" ? "-" : (Math.random()<0.5?"+":"-");
  if(S.op==="+"){
    if(st.carry){
      do { S.a = 2+Math.floor(Math.random()*8); S.b = 2+Math.floor(Math.random()*8); } while(S.a+S.b < 11);
    } else {
      do { S.a = 1+Math.floor(Math.random()*8); S.b = 1+Math.floor(Math.random()*8); } while(S.a+S.b > 9);
    }
    S.answer = S.a+S.b;
  } else {
    if(st.carry){
      S.a = 11+Math.floor(Math.random()*8);
      do { S.b = 2+Math.floor(Math.random()*8); } while(S.b <= S.a%10 || S.a-S.b < 1);
    } else {
      S.a = 3+Math.floor(Math.random()*7);
      do { S.b = 1+Math.floor(Math.random()*6); } while(S.b >= S.a);
    }
    S.answer = S.a-S.b;
  }
  $("problem").textContent = S.a+" "+S.op+" "+S.b+" = ?";
}

function distractors(correct, count){
  const set = new Set([correct]);
  const cands = [correct+1, correct-1, correct+2, correct-2, correct+10, correct-10];
  const out = [];
  let i = 0;
  while(out.length < count && i < 40){
    const pick = cands[Math.floor(Math.random()*cands.length)];
    if(pick >= 0 && pick <= 20 && !set.has(pick)){ set.add(pick); out.push(pick); }
    i++;
  }
  let f = 0;
  while(out.length < count){ if(!set.has(f)){ set.add(f); out.push(f); } f++; }
  return out;
}

function clearMonsters(){
  S.monsters.forEach(m=>scene.remove(m));
  S.monsters = [];
}

function spawnWave(){
  S.advancing = false;
  clearMonsters();
  genProblem();
  S.isBossWave = !!(S.stage.boss && S.solved === S.stage.clearTarget - 1);
  if(S.isBossWave) showMsg("⚔️ ボスもんだい!");
  const count = S.stage.monsterCount;
  const nums = distractors(S.answer, count-1);
  nums.splice(Math.floor(Math.random()*count), 0, S.answer);
  const spread = 11;
  const order = nums.map((n,i)=>i).sort(()=>Math.random()-0.5);
  nums.forEach((n,i)=>{
    const m = makeMonster(n, S.isBossWave && n===S.answer);
    const slot = order[i];
    const x = -spread/2 + spread*(slot/(count-1)) + (Math.random()*1.2-0.6);
    m.position.set(x, 1.3, -34 - Math.random()*6);
    scene.add(m);
    S.monsters.push(m);
  });
}

/* ================= EFFECTS ================= */
function laserTo(target){
  const from = new THREE.Vector3(0, 0.9, 7.2);
  const to = target.position.clone().add(new THREE.Vector3(0,0.2,0));
  const dir = to.clone().sub(from);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(0.09, 0.09, len, 8);
  const mat = new THREE.MeshBasicMaterial({ color:0x7CFC9A });
  const beam = new THREE.Mesh(geo, mat);
  beam.position.copy(from.clone().add(to).multiplyScalar(0.5));
  beam.lookAt(to);
  beam.rotateX(Math.PI/2);
  scene.add(beam);
  S.lasers.push({ mesh:beam, life:0.12 });
  /* point cannon */
  const ang = Math.atan2(to.x-from.x, from.z-to.z);
  cannon.rotation.y = ang;
}

function explode(pos, color){
  for(let i=0;i<16;i++){
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.16+Math.random()*0.14, 6, 5),
      new THREE.MeshBasicMaterial({ color: Math.random()<0.5 ? color : 0xffd93d })
    );
    p.position.copy(pos);
    const v = new THREE.Vector3((Math.random()-0.5)*8, Math.random()*7, (Math.random()-0.5)*8);
    scene.add(p);
    S.particles.push({ mesh:p, vel:v, life:0.7 });
  }
}

/* ================= HIT / MISS / DAMAGE ================= */
const cheers = ["やったね!","すごい!","かんぺき!","ナイス!","てんさい!","その調子!"];
function hitCorrect(monster){
  monster.userData.alive = false;
  laserTo(monster);
  sfx.shoot();
  setTimeout(()=>{
    explode(monster.position.clone(), monster.userData.bodyColor);
    scene.remove(monster);
    sfx.boom();
  }, 90);
  S.monsters = S.monsters.filter(m=>m!==monster);

  const golden = monster.userData.golden;
  const boss = monster.userData.boss;
  S.runCorrect++;
  profile.totalCorrect++;
  let gain = 10 + S.combo*2;
  if(golden) gain *= Progression.GOLDEN_MULTIPLIER;
  S.score += gain;
  awardGems(gain);
  profile.defeated[monster.userData.species] = true;
  if(golden) profile.goldDefeated++;
  saveProfile();

  S.combo++; S.bestCombo = Math.max(S.bestCombo, S.combo);
  S.solved++;
  popCombo();

  const stageCleared = S.solved >= S.stage.clearTarget;
  if(boss){
    sfx.golden();
    showMsg("👑 ボスを たおした!");
  } else if(golden){
    sfx.golden();
    showMsg("✨ きんいろモンスター! " + Progression.GOLDEN_MULTIPLIER + "ばいボーナス!");
  } else if(stageCleared){
    sfx.levelup();
    showMsg("🎉 ステージクリア!");
  } else {
    sfx.good();
    showMsg(cheers[Math.floor(Math.random()*cheers.length)]);
  }
  if(S.combo > 0 && S.combo % 3 === 0) grantRandomItem();
  updateHUD();
  S.advancing = true;
  setTimeout(()=>{
    if(!S.running) return;
    if(stageCleared) clearStage(); else spawnWave();
  }, 650);
}

/* ================= CHERRY (さくらんぼ) SPLIT DIAGRAM ================= */
/* 共通の「さくらんぼ図」HTML。value が null なら "?" (対話式ヒント用)、
   数値が入っていれば すでに わかっている こたえとして 緑色で表示する (まちがい解説用)。 */
function cherryDiagramHTML(topNumber, values){
  function slot(i){
    const v = values[i];
    const filled = v != null;
    return '<button class="cherry-slot' + (filled ? ' filled' : '') + '" data-slot="' + i + '">' + (filled ? v : "?") + '</button>';
  }
  return '<div class="cherry-diagram">' +
    '<div class="cherry-card-top">' + topNumber + '</div>' +
    '<div class="cherry-lines"></div>' +
    '<div class="cherry-slots-row">' + slot(0) + slot(1) + '</div>' +
  '</div>';
}

function cherrySplitFor(a, op, b){
  if(op === "+"){
    const first = 10 - a;
    return { first: first, second: b - first };
  }
  const first = a % 10;
  return { first: first, second: b - first };
}

function renderMistakeExplanation(){
  const st = S.stage;
  $("mistakeProblem").innerHTML = S.a + " " + S.op + " " + S.b + " = <b style='color:#d85a30'>" + S.answer + "</b>";
  if(!st.carry){
    $("mistakeDiagramHost").innerHTML = "";
    $("mistakeSteps").innerHTML = "<p>こたえは <b style='color:#d85a30'>" + S.answer + "</b> だよ。ゆびを つかわずに もう一かい かぞえてみよう!</p>";
    return;
  }
  const split = cherrySplitFor(S.a, S.op, S.b);
  $("mistakeDiagramHost").innerHTML = cherryDiagramHTML(S.b, [split.first, split.second]);
  $("mistakeSteps").innerHTML = S.op === "+"
    ? (S.a + " + " + split.first + " = 10<br>10 + " + split.second + " = " + S.answer)
    : (S.a + " - " + split.first + " = 10<br>10 - " + split.second + " = " + S.answer);
}

  S.combo = 0;

  if(S.hasShield){

    heartLost = true;
    $("flash").style.opacity = 0.45;
    setTimeout(()=>$("flash").style.opacity = 0, 120);
  }
  saveProfile();
  updateHUD();
  showMsg(heartLost ? "ちがうよ! ハートが へった…" : "🛡️ たてが まもった!", true);
  /* wrong monster shakes briefly before the explanation appears */
  const base = monster.position.x;
  let n = 0;
  const iv = setInterval(()=>{
    monster.position.x = base + (n%2 ? 0.25 : -0.25);
    if(++n > 5){ clearInterval(iv); }
  }, 55);
  S.speed += 0.05;
  S.advancing = true;
  S.paused = true;
  setTimeout(()=>{
    renderMistakeExplanation();
    $("mistakeNextBtn").textContent = S.hearts <= 0 ? "けっかを みる" : "つぎの もんだいへ";
    $("mistakeOverlay").style.display = "flex";
  }, 550);
}
$("mistakeNextBtn").addEventListener("click", ()=>{
  $("mistakeOverlay").style.display = "none";
  S.paused = false;
  if(!S.running) return;
  if(S.hearts <= 0) gameOver();
  else spawnWave();
});

function loseHeart(){
  if(S.hasShield){
    S.hasShield = false;
    sfx.good();
    showMsg("🛡️ たてが まもった!");
    spawnWave();
    return;
  }
  S.hearts--;
  sfx.hurt();
  S.combo = 0;
  updateHUD();
  $("flash").style.opacity = 0.45;
  setTimeout(()=>$("flash").style.opacity = 0, 120);
  if(S.hearts <= 0){ gameOver(); }
  else { showMsg("モンスターが きちゃった!", true); spawnWave(); }
}

function pushHistoryEntry(){
  const total = S.runCorrect + S.runWrong;
  if(total === 0) return;
  Progression.addHistoryEntry(profile, {
    ts: Date.now(),
    stageId: S.stage.id,
    stageName: S.stage.icon + " " + S.stage.name,
    correct: S.runCorrect,
    wrong: S.runWrong,
    accuracy: Math.round((S.runCorrect/total)*100),
  });
}

function gameOver(){
  S.running = false;
  clearMonsters();
  $("hud").style.display = "none";
  $("finalstats").innerHTML =
    S.stage.icon + " " + S.stage.name + " で ちからつきた…<br>" +
    "スコア: <b style='color:#ffd93d'>" + S.score + "</b><br>" +
    "たおした もんだい: " + S.solved + " / " + S.stage.clearTarget + " もん<br>" +
    "さいこうコンボ: " + S.bestCombo + " れんぞく";
  profile.bestScore = Math.max(profile.bestScore, S.score);
  profile.bestCombo = Math.max(profile.bestCombo, S.bestCombo);
  pushHistoryEntry();
  saveProfile();
  renderProfileStrip();
  $("run-gems").textContent = "この プレイで 💎+" + S.runGems + " かくとく!";
  const canContinue = profile.gems >= Progression.CONTINUE_COST;
  const cbtn = $("continuebtn");
  cbtn.style.display = canContinue ? "inline-block" : "none";
  cbtn.textContent = "💎" + Progression.CONTINUE_COST + " で つづける";
  $("gameover").style.display = "flex";
}

function continueRun(){
  if(profile.gems < Progression.CONTINUE_COST) return;
  profile.gems -= Progression.CONTINUE_COST;
  saveProfile();
  renderProfileStrip();
  S.hearts = 1;
  S.runCorrect = 0; S.runWrong = 0;
  S.running = true;
  $("gameover").style.display = "none";
  $("hud").style.display = "block";
  updateHUD();
  spawnWave();
}
$("continuebtn").addEventListener("click", continueRun);
$("gameoverMapBtn").addEventListener("click", ()=>{ $("gameover").style.display = "none"; openMap(); });

/* ================= STAGE MAP / STORY ================= */
function hideAllOverlays(){
  ["playerSelect","createProfile","start","map","storyIntro","stageClear","gameover","hud","mistakeOverlay","statsScreen"].forEach(id=>{ $(id).style.display = "none"; });
}

function formatHistoryDate(ts){
  const d = new Date(ts);
  return (d.getMonth()+1) + "/" + d.getDate() + " " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}

function renderStats(){
  const totalC = profile.totalCorrect, totalW = profile.totalWrong;
  const total = totalC + totalW;
  const acc = total > 0 ? Math.round((totalC/total)*100) : null;
  $("statsSummary").innerHTML =
    "せいかい <b style='color:#7cfc9a'>" + totalC + "</b>もん ・ まちがい <b style='color:#ff7b7b'>" + totalW + "</b>もん<br>" +
    (acc!=null ? "せいとうりつ <b style='color:#ffd93d;font-size:1.3em'>" + acc + "%</b>" : "まだ きろくが ないよ");
  const list = $("statsHistory");
  list.innerHTML = "";
  const hist = profile.history.slice().reverse();
  if(hist.length === 0){
    const p = document.createElement("p");
    p.style.color = "#cfe0ff";
    p.textContent = "まだ プレイきろくが ないよ。ぼうけんしてみよう!";
    list.appendChild(p);
    return;
  }
  hist.forEach(h=>{
    const accColor = h.accuracy==null ? "#cfe0ff" : h.accuracy>=80 ? "#7cfc9a" : h.accuracy>=50 ? "#ffd93d" : "#ff7b7b";
    const row = document.createElement("div");
    row.className = "history-row";
    row.innerHTML =
      "<span class='history-date'>" + formatHistoryDate(h.ts) + "</span>" +
      "<span class='history-stage'>" + h.stageName + " (" + h.correct + "/" + (h.correct+h.wrong) + ")</span>" +
      "<span class='history-acc' style='color:" + accColor + "'>" + h.accuracy + "%</span>";
    list.appendChild(row);
  });
}

function openStats(){
  hideAllOverlays();
  renderStats();
  $("statsScreen").style.display = "flex";
}
$("statsBtn").addEventListener("click", openStats);
$("statsBackBtn").addEventListener("click", ()=>{ hideAllOverlays(); $("start").style.display = "flex"; });

function renderMap(){
  const list = $("mapList");
  list.innerHTML = "";
  Progression.STAGES.forEach((stage,i)=>{
    if(i>0){
      const connector = document.createElement("div");
      connector.className = "stage-connector";
      list.appendChild(connector);
    }
    const unlocked = Progression.isStageUnlocked(profile, stage.id);
    const cleared = profile.clearedStages.indexOf(stage.id) >= 0;
    const wrap = document.createElement("div");
    wrap.className = "stage-node-wrap";
    const btn = document.createElement("button");
    btn.className = "stage-node" + (cleared ? " cleared" : "") + (unlocked ? "" : " locked");
    btn.innerHTML =
      '<div class="stage-node-icon">' + (unlocked ? stage.icon : "🔒") + '</div>' +
      '<div><div class="stage-node-name">' + (i+1) + ". " + stage.name + (cleared ? " ✅" : "") + '</div>' +
      '<div class="stage-node-sub">もくひょう ' + stage.clearTarget + 'もん</div></div>';
    if(unlocked) btn.addEventListener("click", ()=>openStoryIntro(stage.id));
    wrap.appendChild(btn);
    list.appendChild(wrap);
  });
}

function openMap(){
  hideAllOverlays();
  renderMap();
  $("map").style.display = "flex";
}
$("startbtn").addEventListener("click", ()=>{ audioInit(); openMap(); });
$("mapBackBtn").addEventListener("click", ()=>{ hideAllOverlays(); $("start").style.display = "flex"; });

let storyStageId = null;
function openStoryIntro(stageId){
  const stage = Progression.getStage(stageId);
  storyStageId = stageId;
  $("storyIcon").textContent = stage.icon;
  $("storyTitle").textContent = (stageId) + ". " + stage.name;
  $("storyText").textContent = stage.intro;
  hideAllOverlays();
  $("storyIntro").style.display = "flex";
}
$("storyStartBtn").addEventListener("click", ()=>{ if(storyStageId!=null) startStage(storyStageId); });
$("storyBackBtn").addEventListener("click", openMap);

function startStage(stageId){
  const stage = Progression.getStage(stageId);
  S.stage = stage;
  S.score = 0; S.combo = 0; S.bestCombo = 0; S.solved = 0; S.hearts = 3;
  S.speed = stage.speedBase; S.running = true; S.paused = false; S.advancing = false;
  S.inventory = []; S.hasShield = false; S.runGems = 0; S.runCorrect = 0; S.runWrong = 0;
  if(S.slowTimer){ clearTimeout(S.slowTimer); S.slowTimer = null; S.preSlowSpeed = null; }
  updateHUD();
  renderInventory();
  $("hintbtn").style.display = stage.carry ? "" : "none";
  hideAllOverlays();
  $("hud").style.display = "block";
  spawnWave();
}

function clearStage(){
  S.running = false;
  clearMonsters();
  hideAllOverlays();
  const stage = S.stage;
  const bonus = 20 + stage.clearTarget*2;
  awardGems(bonus);
  profile.bestScore = Math.max(profile.bestScore, S.score);
  profile.bestCombo = Math.max(profile.bestCombo, S.bestCombo);
  Progression.markStageCleared(profile, stage.id);
  pushHistoryEntry();
  saveProfile();
  renderProfileStrip();
  $("clearIcon").textContent = stage.icon;
  $("clearText").textContent = stage.clear;
  $("stageClearGems").textContent = "💎+" + bonus + " ボーナス! (この プレイで 💎+" + S.runGems + ")";
  const next = Progression.getStage(stage.id+1);
  const nextBtn = $("nextStageBtn");
  if(next){
    nextBtn.style.display = "inline-block";
    nextBtn.textContent = "つぎの ステージへ";
    nextBtn.onclick = ()=>openStoryIntro(next.id);
  } else {
    nextBtn.style.display = "none";
  }
  $("stageClear").style.display = "flex";
}
$("clearMapBtn").addEventListener("click", openMap);

/* ================= INPUT (touch + mouse) ================= */
const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2();
function onTap(clientX, clientY){
  if(!S.running || S.paused || S.advancing) return;
  ptr.x = (clientX/window.innerWidth)*2 - 1;
  ptr.y = -(clientY/window.innerHeight)*2 + 1;
  ray.setFromCamera(ptr, camera);
  /* generous hit area: test against invisible-ish big sphere = just use children with threshold */
  const hits = ray.intersectObjects(S.monsters, true);
  if(hits.length){
    const root = hits[0].object.userData.root;
    if(root && root.userData.alive){
      if(root.userData.answer === S.answer) hitCorrect(root);
      else hitWrong(root);
    }
  }
}
renderer.domElement.addEventListener("pointerdown", e=>{ e.preventDefault(); onTap(e.clientX, e.clientY); }, { passive:false });
document.addEventListener("gesturestart", e=>e.preventDefault());
document.addEventListener("dblclick", e=>e.preventDefault());

/* ================= HINT (対話式さくらんぼ計算) ================= */
let cherrySlots = [null, null];
let cherryTarget = { first:0, second:0 };

function renderHintDiagram(){
  $("hintDiagramHost").innerHTML = cherryDiagramHTML(S.b, cherrySlots);
}

function renderCherryPad(){
  const pad = $("cherryPad");
  pad.innerHTML = "";
  for(let n=0;n<=9;n++){
    const btn = document.createElement("button");
    btn.className = "cherry-num";
    btn.textContent = n;
    btn.addEventListener("click", ()=>onCherryNumTap(n));
    pad.appendChild(btn);
  }
}

function onCherryNumTap(n){
  const idx = cherrySlots[0]==null ? 0 : (cherrySlots[1]==null ? 1 : null);
  if(idx === null) return;
  cherrySlots[idx] = n;
  renderHintDiagram();
  if(cherrySlots[0]!=null && cherrySlots[1]!=null) checkCherrySplit();
}

function checkCherrySplit(){
  const t = cherryTarget;
  const ok = (cherrySlots[0]===t.first && cherrySlots[1]===t.second) ||
             (cherrySlots[0]===t.second && cherrySlots[1]===t.first);
  if(ok){
    sfx.good();
    $("cherryFeedback").innerHTML = "<span style='color:#3ec46d'>せいかい! &#127881;</span>";
    $("cherrySteps").innerHTML = S.op === "+"
      ? (S.a + " + " + t.first + " = 10<br>10 + " + t.second + " = " + S.answer)
      : (S.a + " - " + t.first + " = 10<br>10 - " + t.second + " = " + S.answer);
  } else {
    sfx.bad();
    $("cherryFeedback").innerHTML = "<span style='color:#ff7b7b'>おしい! もういちど!</span>";
    setTimeout(()=>{
      cherrySlots = [null, null];
      renderHintDiagram();
      $("cherryFeedback").textContent = "";
    }, 900);
  }
}

function resetCherry(){
  cherrySlots = [null, null];
  $("cherryFeedback").textContent = "";
  $("cherrySteps").innerHTML = "";
  renderHintDiagram();
}
$("cherryResetBtn").addEventListener("click", resetCherry);
$("hintDiagramHost").addEventListener("click", e=>{
  const btn = e.target.closest(".cherry-slot");
  if(!btn || !btn.classList.contains("filled")) return;
  cherrySlots[Number(btn.dataset.slot)] = null;
  $("cherryFeedback").textContent = "";
  $("cherrySteps").innerHTML = "";
  renderHintDiagram();
});

$("hintbtn").addEventListener("click", ()=>{
  if(!S.running) return;
  S.paused = true;
  cherryTarget = cherrySplitFor(S.a, S.op, S.b);
  cherrySlots = [null, null];
  $("hintProblem").textContent = S.a + " " + S.op + " " + S.b + " = ?";
  $("cherryInstruction").textContent = S.b + " を さくらんぼに わけよう! すうじを タップしてね。";
  $("cherryFeedback").textContent = "";
  $("cherrySteps").innerHTML = "";
  renderHintDiagram();
  renderCherryPad();
  $("hintoverlay").style.display = "flex";
});
$("hintclose").addEventListener("click", ()=>{
  $("hintoverlay").style.display = "none";
  S.paused = false;
});

/* ================= RETRY ================= */
$("retrybtn").addEventListener("click", ()=>{ if(S.stage) startStage(S.stage.id); });

/* ================= MAIN LOOP ================= */
function animate(t){
  requestAnimationFrame(animate);
  const dt = Math.min((t - S.lastT)/1000, 0.05) || 0.016;
  S.lastT = t;

  clouds.forEach((c,i)=>{ c.position.x += dt*(0.3+i*0.1); if(c.position.x > 26) c.position.x = -26; });

  if(S.running && !S.paused){
    for(const m of S.monsters){
      m.position.z += S.speed * dt * 3.2;
      m.userData.bobPhase += dt*5;
      m.position.y = 1.3 + Math.sin(m.userData.bobPhase)*0.18;
      m.rotation.z = Math.sin(m.userData.bobPhase*0.7)*0.08;
      m.userData.label.lookAt(camera.position);
      if(m.position.z > 5.5){ loseHeart(); break; }
    }
  }

  for(let i=S.particles.length-1;i>=0;i--){
    const p = S.particles[i];
    p.life -= dt;
    p.vel.y -= 14*dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.scale.multiplyScalar(Math.max(0, 1 - dt*2.2));
    if(p.life <= 0){ scene.remove(p.mesh); S.particles.splice(i,1); }
  }
  for(let i=S.lasers.length-1;i>=0;i--){
    const l = S.lasers[i];
    l.life -= dt;
    if(l.life <= 0){ scene.remove(l.mesh); S.lasers.splice(i,1); }
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
})();
</script>
