<!DOCTYPE html>
<html lang="ja" class="kids-app">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>きっずスタディ - まなびのしま</title>
<link rel="stylesheet" href="shared/css/tokens.css">
<style>
  /* シンプルなハブ: 静かな星空 + アプリカード。派手な演出は各アプリ側に任せる */
  html.kids-app, body.kids-app { overflow-y: auto; touch-action: pan-y; }

  body {
    min-height: 100%;
    background:
      url("shared/img/bg-stars1.png") repeat-x top / auto 100vh,
      linear-gradient(180deg, #131024 0%, #1a1530 100%);
    image-rendering: pixelated;
    color: #fff;
    padding: max(28px, env(safe-area-inset-top)) 20px 48px;
  }

  .hub {
    max-width: 1080px;
    margin: 0 auto;
  }

  .hub-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .hub-header h1 {
    font-size: clamp(30px, 5.5vw, 48px);
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 3px 0 #0a0618;
  }
  .hub-header h1 .em { color: var(--kids-accent); }
  .hub-header p {
    margin-top: 10px;
    color: #b9b0d6;
    font-size: clamp(14px, 2.2vw, 17px);
    font-weight: 700;
  }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 22px;
  }

  .app-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(16, 12, 34, 0.9);
    border: 2px solid #3c3560;
    border-radius: 14px;
    padding: 22px;
    text-decoration: none;
    color: #fff;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
    transition: transform 0.12s ease-out, border-color 0.12s ease-out;
  }
  .app-card:hover,
  .app-card:focus-visible {
    transform: translateY(-3px);
    border-color: var(--card-color, #9be7ff);
    outline: none;
  }
  .app-card:active { transform: translateY(0); }

  .app-icon { height: 68px; display: flex; align-items: center; }
  .app-icon img {
    image-rendering: pixelated;
    height: 60px;
    width: auto;
  }
  .app-icon .emoji { font-size: 48px; line-height: 1; }

  .app-subject {
    align-self: flex-start;
    font-size: 12px;
    font-weight: 800;
    color: #171225;
    background: var(--card-color, #ffd93d);
    border-radius: 999px;
    padding: 4px 12px;
  }
  .app-title {
    font-size: clamp(18px, 3vw, 21px);
    font-weight: 900;
  }
  .app-desc {
    font-size: 14px;
    line-height: 1.6;
    color: #b9b0d6;
    flex: 1;
  }
  .app-play {
    align-self: flex-start;
    font-weight: 900;
    font-size: 14px;
    color: var(--card-color, #ffd93d);
  }
  .app-card:hover .app-play,
  .app-card:focus-visible .app-play {
    text-decoration: underline;
  }

  .empty-note {
    text-align: center;
    color: #b9b0d6;
    font-size: 15px;
    margin-top: 20px;
  }
</style>
</head>
<body class="kids-app kids-reset">
  <div class="hub">
    <header class="hub-header">
      <h1>きっずスタディ <span class="em">まなびのしま</span></h1>
      <p>すきなアプリを えらんで あそびながら べんきょうしよう！</p>
    </header>
    <main class="app-grid" id="app-grid" aria-label="べんきょうアプリ いちらん"></main>
    <p class="empty-note" id="empty-note" hidden>まだ あぷりが ありません。</p>
  </div>

  <script src="shared/js/apps-registry.js"></script>
  <script>
  (function () {
    "use strict";
    const apps = window.KIDS_APPS || [];
    const grid = document.getElementById("app-grid");
    const emptyNote = document.getElementById("empty-note");

    if (!apps.length) {
      emptyNote.hidden = false;
      return;
    }

    apps.forEach(function (app) {
      const card = document.createElement("a");
      card.className = "app-card";
      card.href = app.path;
      card.style.setProperty("--card-color", app.color || "#9be7ff");

      /* image があればドット絵アイコン、なければ絵文字にフォールバック */
      const icon = app.image
        ? '<img src="' + app.image + '" alt="">'
        : '<span class="emoji">' + app.emoji + "</span>";

      card.innerHTML =
        '<div class="app-icon">' + icon + "</div>" +
        '<div class="app-subject">' + app.subject + "</div>" +
        '<div class="app-title">' + app.title + "</div>" +
        '<div class="app-desc">' + app.description + "</div>" +
        '<div class="app-play">▶ あそぶ</div>';

      grid.appendChild(card);
    });
  })();
  </script>
</body>
</html>
